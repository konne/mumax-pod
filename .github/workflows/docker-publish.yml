name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mumax3-python-env-cuda12.0
            cuda_image: nvidia/cuda:12.0.1-runtime-ubuntu22.04
            mumax_url: https://mumax.ugent.be/mumax3-binaries/mumax3.12_linux_cuda12.0.tar.gz
          - image: mumax3-python-env-cuda12.8
            cuda_image: nvidia/cuda:12.8.0-runtime-ubuntu24.04
            mumax_url: https://mumax.ugent.be/mumax3-binaries/mumax3.12_linux_cuda12.6.tar.gz
          - image: mumax3-python-env-cuda12.9
            cuda_image: nvidia/cuda:12.9.1-runtime-ubuntu24.04
            mumax_url: https://mumax.ugent.be/mumax3-binaries/mumax3.12_linux_cuda12.9.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            MUMAX_URL=${{ matrix.mumax_url }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest

      - name: Image digest
        if: github.event_name == 'push'
        run: echo ${{ steps.docker_build.outputs.digest }}
